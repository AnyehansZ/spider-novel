# GitHub Actions for NovelForge - Comprehensive CI/CD Workflow
# File: .github/workflows/ci.yml
#
# Features:
# - Multi-platform testing (Windows, Linux, macOS)
# - Python 3.8-3.12 compatibility
# - Rich library edge case handling
# - Comprehensive error handling
# - Dependency caching
# - Code quality checks
# - Artifact preservation

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements*.txt'
  workflow_dispatch:  # Manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: 1
  PIP_CACHE_DIR: ~/.cache/pip
  # Disable rich colors on CI (prevent terminal issues)
  RICH_FORCE_TERMINAL: 0
  # Force UTF-8 encoding globally
  PYTHONIOENCODING: utf-8

jobs:
  # ========================================================================
  # STAGE 1: Code Quality & Linting
  # ========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8 black isort mypy pylint --quiet
        continue-on-error: true  # Don't fail if already installed
      
      - name: Check code formatting (black)
        run: |
          black --check --diff . || echo "⚠️ Code formatting issues found"
        continue-on-error: true
      
      - name: Check import sorting (isort)
        run: |
          isort --check-only --diff . || echo "⚠️ Import sorting issues found"
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          # E501: line too long (handled by black)
          # W503: line break before binary operator
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true
      
      - name: Type checking with mypy
        run: |
          mypy . --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true
        continue-on-error: true

  # ========================================================================
  # STAGE 2: Dependency Check
  # ========================================================================
  dependency-check:
    name: Dependency Compatibility
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Check dependency conflicts
        run: |
          python -m pip install --upgrade pip
          pip install pipdeptree safety --quiet
          echo "=== Dependency Tree ==="
          pipdeptree --warn fail 2>&1 || echo "⚠️ Dependency warnings"
          echo ""
          echo "=== Security Check ==="
          safety check --json --output json 2>&1 | head -20 || echo "⚠️ Security check skipped"
        continue-on-error: true
      
      - name: Validate requirements files
        run: |
          python -c "
          import re
          files = ['requirements.txt', 'requirements_pypub.txt']
          for f in files:
              try:
                  with open(f) as fp:
                      for line in fp:
                          line = line.strip()
                          if not line or line.startswith('#'):
                              continue
                          if '==' not in line and not line.startswith('-'):
                              print(f'⚠️ {f}: {line} - Missing version pin')
              except FileNotFoundError:
                  pass
          "

  # ========================================================================
  # STAGE 3: Multi-Python Testing
  # ========================================================================
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: dependency-check
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          # Reduce test matrix for cost (test all versions only on Ubuntu)
          - os: windows-latest
            python-version: '3.8'
          - os: windows-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.8'
          - os: macos-latest
            python-version: '3.9'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Display Python version
        run: python --version
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --quiet
          pip install pytest pytest-cov pytest-timeout --quiet
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
      
      - name: Import test (quick validation)
        run: |
          python -c "
          print('Testing imports...')
          try:
              import config
              print('✓ config')
              import utils
              print('✓ utils')
              import error_handler
              print('✓ error_handler')
              import validators
              print('✓ validators')
              import manifest_manager
              print('✓ manifest_manager')
              import settings_manager
              print('✓ settings_manager')
              import enhancer
              print('✓ enhancer')
              import compiler
              print('✓ compiler')
              import base_crawler
              print('✓ base_crawler')
              print('All imports successful!')
          except ImportError as e:
              print(f'✗ Import failed: {e}')
              exit(1)
          "
      
      - name: Run basic functionality tests
        run: |
          python -c "
          import tempfile
          from pathlib import Path
          import sys
          
          print('Testing basic functionality...')
          
          # Test 1: Config loads
          try:
              import config as cfg
              assert cfg.APP_DIR is not None
              print('✓ Config loads successfully')
          except Exception as e:
              print(f'✗ Config test failed: {e}')
              sys.exit(1)
          
          # Test 2: Validators work
          try:
              from validators import validate_url, ValidationError
              validate_url('https://example.com/chapter-1')
              print('✓ Validators work')
          except ValidationError:
              print('✓ Validators correctly reject invalid input')
          except Exception as e:
              print(f'✗ Validator test failed: {e}')
              sys.exit(1)
          
          # Test 3: File operations
          try:
              import utils
              with tempfile.TemporaryDirectory() as tmpdir:
                  folder = utils.ensure_folder(Path(tmpdir) / 'test')
                  assert folder.exists()
              print('✓ File operations work')
          except Exception as e:
              print(f'✗ File operation test failed: {e}')
              sys.exit(1)
          
          # Test 4: Manifest loads
          try:
              from manifest_manager import ManifestManager
              mm = ManifestManager()
              print('✓ Manifest manager works')
          except Exception as e:
              print(f'✗ Manifest test failed: {e}')
              sys.exit(1)
          
          print('All basic tests passed!')
          "
        timeout-minutes: 5
        continue-on-error: true
      
      - name: Run pytest (if available)
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --timeout=10 2>&1 | head -100
          else
            echo "No tests directory found"
          fi
        shell: bash
        continue-on-error: true
      
      - name: Rich library compatibility check
        if: always()
        run: |
          python -c "
          print('Checking Rich library compatibility...')
          try:
              from rich.console import Console
              from rich.panel import Panel
              from rich.table import Table
              
              # Test: Console works without terminal
              console = Console(force_terminal=False, width=80)
              console.print('[bold green]Rich library works![/bold green]')
              print('✓ Rich library compatible')
          except Exception as e:
              print(f'⚠️ Rich library warning: {e}')
          "

  # ========================================================================
  # STAGE 4: Windows Standalone Build Test
  # ========================================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --quiet
          pip install pyinstaller --quiet
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
      
      - name: Create PyInstaller spec file
        run: |
          python -c "
          import PyInstaller.utils.hooks as hooks
          spec_content = '''
          # -*- mode: python ; coding: utf-8 -*-
          import sys
          from pathlib import Path
          
          block_cipher = None
          
          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[],
              hiddenimports=['rich', 'google.genai', 'bs4', 'ebooklib'],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludedimports=[],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          
          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.zipfiles,
              a.datas,
              [],
              name='NovelForge',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          '''
          with open('NovelForge.spec', 'w') as f:
              f.write(spec_content)
          print('✓ PyInstaller spec created')
          "
      
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller NovelForge.spec --noconfirm --distpath ./dist --workpath ./build
        continue-on-error: true
      
      - name: Verify build output
        if: always()
        run: |
          if (Test-Path "dist/NovelForge.exe") {
              $size = (Get-Item "dist/NovelForge.exe").length / 1MB
              Write-Host "✓ NovelForge.exe created (${size:F1} MB)"
          } else {
              Write-Host "⚠️ EXE not created - checking dist folder..."
              Get-ChildItem dist/ -Recurse | Select-Object FullName
          }
        shell: pwsh
      
      - name: Upload Windows executable
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: NovelForge-Windows-${{ github.run_number }}
          path: dist/
          retention-days: 30

  # ========================================================================
  # STAGE 5: Documentation & Validation
  # ========================================================================
  docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check documentation completeness
        run: |
          echo "Checking documentation files..."
          files=(
            "README.md"
            "INSTALLATION_GUIDE.md"
            "DEVELOPER_REFERENCE.md"
            "EPUB_ALTERNATIVES.md"
          )
          
          for file in "${files[@]}"; do
              if [ -f "$file" ]; then
                  lines=$(wc -l < "$file")
                  echo "✓ $file ($lines lines)"
              else
                  echo "⚠️ Missing: $file"
              fi
          done
      
      - name: Markdown validation
        run: |
          # Basic markdown syntax check
          python -c "
          import re
          import sys
          
          markdown_files = [
              'README.md',
              'INSTALLATION_GUIDE.md',
              'DEVELOPER_REFERENCE.md',
              'EPUB_ALTERNATIVES.md',
          ]
          
          for filename in markdown_files:
              try:
                  with open(filename, encoding='utf-8') as f:
                      content = f.read()
                  
                  # Check for common issues
                  issues = []
                  
                  # Check for mismatched brackets
                  if content.count('[') != content.count(']'):
                      issues.append('Mismatched square brackets')
                  
                  # Check for code blocks
                  code_blocks = len(re.findall(r'^\`\`\`', content, re.MULTILINE))
                  if code_blocks % 2 != 0:
                      issues.append('Unclosed code blocks')
                  
                  if issues:
                      print(f'⚠️ {filename}: {issues}')
                  else:
                      print(f'✓ {filename}')
              except FileNotFoundError:
                  print(f'⚠️ Missing: {filename}')
          "
        continue-on-error: true

  # ========================================================================
  # STAGE 6: Final Status Report
  # ========================================================================
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, dependency-check, test, docs]
    if: always()
    
    steps:
      - name: Check pipeline status
        run: |
          echo "=== CI/CD Pipeline Status ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Dependencies: ${{ needs.dependency-check.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Docs: ${{ needs.docs.result }}"
          
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ Pipeline successful"
          fi

  # ========================================================================
  # STAGE 7: Cleanup (remove artifacts after retention period)
  # ========================================================================
  cleanup:
    name: Artifact Cleanup
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Remove old artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: NovelForge-Windows-*
          failOnError: false
        continue-on-error: true
