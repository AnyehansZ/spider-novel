name: Build and Release SpiderNovel

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Check for icon.ico
      shell: pwsh
      run: |
        if (Test-Path "icon.ico") {
          Write-Host "✓ icon.ico found"
          $env:HAS_ICON = "true"
        } else {
          Write-Host "⚠️ icon.ico not found - will build without icon"
          $env:HAS_ICON = "false"
        }
        echo "HAS_ICON=$env:HAS_ICON" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build EXE with PyInstaller
      shell: cmd
      run: |
        if "%HAS_ICON%"=="true" (
          pyinstaller --name "NovelForge" --onefile --icon=icon.ico --collect-all rich --clean --distpath ./dist --workpath ./build main.py
        ) else (
          pyinstaller --name "NovelForge" --onefile --collect-all rich --clean --distpath ./dist --workpath ./build main.py
        )

    - name: Verify Build Output
      shell: pwsh
      run: |
        if (Test-Path "dist/NovelForge.exe") {
          $size = [math]::Round((Get-Item "dist/NovelForge.exe").length / 1MB, 2)
          Write-Host "✓ NovelForge.exe created successfully (${size} MB)"
        } else {
          Write-Host "✗ Build failed - NovelForge.exe not found"
          Get-ChildItem dist/ -Recurse
          exit 1
        }

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovelForge-Windows
        path: dist/NovelForge.exe
        retention-days: 30

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/NovelForge.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}