name: Build and Release SpiderNovel

on:
  push:
    branches: [ "main" ] # Builds on every commit to check for errors
    tags:
      - 'v*' # Triggers a Release when you push a tag (e.g., v1.0, v2.3.1)
  workflow_dispatch:

# This permission is required to upload the EXE to the Releases page
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --collect-all rich: Fixes the "No module named rich._unicode_data" crash
        # --onefile: Bundles everything into a single .exe
        pyinstaller --name "SpiderNovel" --onefile --icon=icon.ico --collect-all rich main.py

    # 1. Always upload as an artifact (good for testing builds without releasing)
    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpiderNovel-Windows
        path: dist/SpiderNovel.exe

    # 2. If this was triggered by a Tag, publish it to the Releases page
    - name: Publish Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/SpiderNovel.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}