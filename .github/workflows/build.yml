name: Build and Release SpiderNovel

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0, v2.0.1, etc.
  workflow_dispatch: # Allows manual triggering for testing

permissions:
  contents: write  # REQUIRED: Allow the action to create a Release

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --collect-all rich fixes the error you just saw
        pyinstaller --name "SpiderNovel" --onefile --icon=icon.ico --collect-all rich main.py

    # This creates the Release and attaches the EXE
    - name: Release to GitHub
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') # Only run this if a tag triggered the workflow
      with:
        files: dist/SpiderNovel.exe
        name: Release ${{ github.ref_name }} # Names the release "Release v1.0"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}