name: Build SpiderNovel EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --name sets the output filename to SpiderNovel.exe
        pyinstaller --name "SpiderNovel" --onefile --icon=icon.ico main.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpiderNovel-Windows  # The name of the downloadable zip on GitHub
        path: dist/SpiderNovel.exe # This must match the name set in the step above