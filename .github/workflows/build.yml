name: Build spider EXE

on:
  push:
    branches: [ "main" ] # Triggers when you push to main
  workflow_dispatch:     # Allows you to trigger it manually from GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Stable version for building

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --onefile packages everything into a single .exe
        # --icon sets your custom icon
        # --name sets the output file name
        pyinstaller --name "NovelForge" --onefile --icon=icon.ico main.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Spider-Windows
        path: Spider.exe